<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela 2.2 - Cadastro Serra Jr</title>
    <link rel="stylesheet" href="style2-2.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <main class="container">
        <div class="register-card">
            <header class="card-header">
                <h2>Cadastro</h2>
                <img src="assets/logo.png" alt="Logo Serra Jr" class="logo">
            </header>
            
            <div class="card-body">
                <div class="input-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="exemplo@123.com">
                </div>

                <div class="input-group">
                    <label for="senha">Senha:</label>
                    <div class="password-wrapper">
                        <input type="password" id="senha" placeholder="exemplo123">
                        <button type="button" class="toggle-password" data-target="senha">👁️</button>
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirmarSenha">Confirmar Senha:</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmarSenha" placeholder="exemplo123">
                        <button type="button" class="toggle-password" data-target="confirmarSenha">👁️</button>
                    </div>
                </div>

                <button id="btnEntrar" class="btn-entrar">Entrar</button>
            </div>
        </div>
    </main>

    <script src="script2-2.js"></script>
</body>
</html>
