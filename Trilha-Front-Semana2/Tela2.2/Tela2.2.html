<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="Tela2.2.css">
    <title>Tela2.2</title>

</head>

<body>
    <header class="BoxTop">
        <p>Cadastro</p>
        <img id="LogoSerra" src="Logo SerraJr 1.png" alt="Logo Serra Júnior">
    </header>

    <div class="BoxBotton">
        <form action="" class="formulario">

            <label for="email">Email:</label>
            <input type="email" name="email" id="email" placeholder="exemplo@123.com" required>

            <label for="senha">Senha:</label>
            <input type="password" name="senha" id="senha" placeholder="exemplo123" required>

            <label for="confsenha">Confirmar Senha:</label>
            <input type="password" name="confsenha" id="confsenha" placeholder="exemplo123" required>

            <input type="submit" onclick="verificacao()" id="botao" value="Criar">

        </form>

    </div>

<script src="Tela2.2.js"></script>
</body>

</html>
