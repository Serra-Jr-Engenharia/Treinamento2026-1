<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"/>
    <title>Tela Semana 2.2</title>
</head>
<body>
    
    <main class="card">
        <header class="card-topo">
            <h1>Cadastro</h1>
            <img src="Logo SerraJr 1.png" alt="logo">
        </header>
        <div class="card-corpo">
            <div class="formulario">

                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="exemplo@123.com">
            
                <label for="senha">Senha:</label>
                <input type="password" id="senha" placeholder="exemplo123">
                
                <label for="confirmar">Confirmar Senha:</label>
                <input type="password" id="confirmar" placeholder="exemplo123">

            </div>
            <button class="button" onclick="criar()">Criar</button>
        </div>

    </main>
    <script src="script.js"></script>
</body>
</html>
