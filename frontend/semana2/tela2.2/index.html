<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"/>
    <title>Tela 2.2</title>
</head>
<body>
    
    <div class="card-cadastro">

        <div class="cartao-top">
            <h1>Cadrastro</h1>
            <img src="logo_serra_branco.png" class="logo-serra" alt="Logo Serra Jr."> 
        </div>

        <div class="cartao-bottom">
            <form class="formulario-cadastro" novalidate>

                <div class="campos-cadastro">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="exemplo@123.com">
                </div>

                <div class="campos-cadastro">
                    <label for="senha">Senha:</label>
                    <div class="caixa-input">
                        <input type="password" id="senha" placeholder="exemplo123">
                        <img src="olho_aberto.svg" class="olho-aberto" alt="Mostrar senha">
                    </div>     
                </div>

                <div class="campos-cadastro">
                    <label for="confirm-senha">Confirmar Senha:</label>
                    <div class="caixa-input">
                        <input type="password" id="confirm-senha" placeholder="exemplo123">
                        <img src="olho_aberto.svg" class="olho-aberto" alt="Mostrar senha">
                    </div>    
                </div>
            
                <div class="botao-criar">
                    <button type="submit" id="btn-criar" class="btn btn-criar">Criar</button>
                </div>

            </form>    
        </div> 
    </div>






    <script src="script.js"></script>
</body>
</html>
