<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabarito Semana 2.2 - Serra Jr</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="card">

        <header class="card-topo">
            <h1>Cadastro</h1>
            <img src="LogoSerraJr.png" alt="Logo Serra Jr" class="logo">
        </header>

        <div class="card-corpo">
            <form id="formCadastro">
                
                <div class="input-grupo">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="exemplo@123.com">
                </div>

                <div class="input-grupo">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" placeholder="exemplo123">
                </div>

                <div class="input-grupo">
                    <label for="confirmarSenha">Confirmar Senha:</label>
                    <input type="password" id="confirmarSenha" placeholder="exemplo123">
                </div>

                <button type="submit" id="btnCriar" class="btn-criar">Criar</button>

            </form>
        </div>

    </main>

    <script src="script.js"></script>

</body>

</html>
