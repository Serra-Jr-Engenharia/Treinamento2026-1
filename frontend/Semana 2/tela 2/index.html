<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class="card-topo">
            <h2>Cadastro</h2>
            <div class="logo"><img src="logo.png" alt="logo"></div>
        </div>

        <div class="card-corpo">
            <form id="form-cadastro">
                
                <div class="input-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="exemplo@123.com" required>
                </div>

                <div class="input-group">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" placeholder="exemplo123" required>
                </div>

                <div class="input-group">
                    <label for="confirmar-senha">Confirmar Senha:</label>
                    <input type="password" id="confirmar-senha" placeholder="exemplo123" required>
                </div>

                <div class="area-botao">
                    <button type="submit" id="btn-criar">Criar</button>
                </div>

            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
