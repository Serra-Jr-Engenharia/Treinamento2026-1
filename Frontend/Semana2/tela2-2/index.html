<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="imgs/Logo SerraJr.png">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/script.js" defer></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <title>Semana 2-2</title>
</head>

<body>
  <div class="container">

    <div class="overlay">

      <div class="toast">

        <div class="toast-title">
          <h1 class="toast-title-text">Formulario</h1>
        </div>

        <div class="toast-body">
          <div class="toast-body-content"></div>
          <div class="toast-body-btn">Exibir registros</div>
        </div>



      </div>

    </div>

    <div class="card">

      <div class="card-title">
        <h1 class="card-title-text">Cadastro</h1>
        <img src="imgs/Logo SerraJr.png" alt="logo SerraJr" class="card-title-logo">
      </div>

      <div class="card-form">
        <form action="" class="form">
          <label for="email" class="label-email">Email:</label>
          <input type="text" placeholder="exemplo@123.com" class="input-email">

          <label for="email" class="label-senha">Senha:</label>
          <input type="text" placeholder="exemplo123" class="input-senha">

          <label for="email" class="label-senha">Confirmar Senha:</label>
          <input type="text" placeholder="exemplo123" class="input-confirmar">
          <p class="form-warning">*A senha deve contar ao menos uma letra maiúscula e uma minúscula. </p>
        </form>

        <div class="card-form-btn">Criar</div>
      </div>

    </div>

  </div>

</body>

</html>
