<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="imgs/image.webp">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/script.js" defer></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <title>Semana 2-1</title>
</head>

<body>
  <div class="container">

    <div class="card">

      <div class="card-title">
        <h1 class="card-title-text">Quantidade de Integrantes na Equipe</h1>
      </div>

      <div class="card-counter">
        <p class="card-counter-number">0</p>
      </div>

    </div>

    <div class="button">
      <div class="button-rmv bloqueado" data-value="total">Remover</div>
      <div class="button-add bloqueado" data-value="total">Adicionar</div>
    </div>


    <div class="cargos">

      <div class="cargos-title">
        <ul class="cargos-title-list">
          <li class="title-presidentes">Presidente</li>
          <li class="title-diretores">Diretores</li>
          <li class="title-assessores">Assessores</li>
          <li class="title-estagiarios">Estagiários</li>
          <li class="title-total">Total</li>
        </ul>
      </div>

      <div class="cargos-counter">
        <ul class="cargos-counter-list">
          <li class="contador-presidentes">0</li>
          <li class="contador-diretores">0</li>
          <li class="contador-assessores">0</li>
          <li class="contador-estagiarios">0</li>
          <li class="contador-total">0</li>
        </ul>
      </div>



    </div>

  </div>
</body>

</html>
