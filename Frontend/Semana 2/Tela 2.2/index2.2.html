<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela 2.2</title>
    <link rel="stylesheet" href="style2.2.css">
</head>
<body>
    <section>
        <div class ='container' id="container">
            <div class = "card" id="card">
                <div class = "cardtop" id="cardtop"> 
                    Cadastro
                    <img src="Imagens\Logo.png" alt="Logo do Serra JR." class="logo">
                </div>
                
            <form id="cardbd" class="cardbd">
                <div class="campo">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="exemplo@123.com" required>
                </div>

                <div class="campo">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" placeholder="exemplo123" required>
                </div>

                <div class="campo">
                    <label for="confirmar-senha">Confirmar Senha:</label>
                    <input type="password" id="confirmar-senha" placeholder="exemplo123" required>
                </div>
                <div class = 'botao'>
                    <button id="Criar" onclick="criar()">Criar</button>
                </div>
            </form>

        
    </section>
</body>
</html>

<script src="script2.2.JS"></script>
