<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semana 3</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="wrapper">
        <main class="main-container">
            <form class="search-container">
                <input type="search" placeholder="CEP" id="cep-input">
                <button type="submit">Pesquisar</button>
            </form>
            <div class="result-container">
                <div class="result-top">
                    <span id="cep">CEP: 00000-000</span>
                </div>
                <div class="result-bottom">
                    <ul>
                        <li id="logradouro">Logradouro: </li>
                        <li id="complemento">Complemento: </li>
                        <li id="bairro">Bairro: </li>
                        <li id="localidade">Localidade: </li>
                        <li id="uf">UF: </li>
                        <li id="estado">Estado: </li>
                    </ul>
                    <ul id="more-details" class="hidden">
                        <li id="regiao">Região: </li>
                        <li id="ibge">IBGE: </li>
                        <li id="gia">GIA: </li>
                        <li id="ddd">DDD: </li>
                        <li id="siafi">Siafi: </li>
                    </ul>
                    <button id="see-more" class="hidden">Ver mais detalhes</button>
                    <div class="map-container">
                        <iframe id="maps-iframe" class="hidden" frameborder="0" allowfullscreen="">
                        </iframe>
                    </div>
                </div>
            </div>
        </main>
        <aside class="history-container">
            <div class="history-top">
                <h3>Histórico de Buscas:</h3>
            </div>
            <div class="history-bottom">
                <ul id="history-list"></ul>
            </div>
        </aside>
    </div>

    <div id="alert-container">
    </div>

    <script src="script.js"></script>
</body>

</html>
